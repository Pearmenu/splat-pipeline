# Tunable parameters for the splat pipeline. Sane defaults for a turntable dish.

frames:
  fps: 3              # frames per second to extract from the video
  max_frames: 150     # hard cap (uniformly subsampled if exceeded)
  blur_threshold: 40.0  # min Laplacian variance; frames below are discarded as blurry
  max_dim: 1600       # downscale long edge to this (0 = keep original). Big speedup.

mask:
  mode: birefnet           # birefnet (AI saliency, drops the plate) | chroma (keep plate)
  # --- chroma mode (use with a solid GREEN backdrop+base; keeps the plate) ---
  chroma_color: auto       # "auto" = sample the frame corners, or [r,g,b]
  chroma_tol: 70           # color distance to count as foreground (raise if base bleeds in)
  # --- birefnet mode ---
  model: birefnet-general  # rembg model: birefnet-general | isnet-general-use | u2net
  use_gpu: true            # run BiRefNet on the GPU (CPU is ~40x slower)
  threshold: 40            # alpha cutoff (LOW, so the low-confidence PLATE is kept)
  close_px: 7              # morphological close: fuse plate+food into one blob
  keep_largest: true       # keep only the largest blob (drops stray background)
  fill_holes: true         # fill interior holes in the mask
  dilate_px: 4             # grow a touch to capture the plate rim
  erode_px: 0              # final shrink (0 = none)
  min_area_ratio: 0.02     # discard frame if the subject covers less than this

sfm:
  use_glomap: true         # GLOMAP mapper (fast). false => colmap mapper (slower)
  camera_model: OPENCV
  matcher: sequential      # sequential (video frames) | exhaustive (robust, slower)

train:
  iters: 30000             # more iterations = denser, more SOLID (less translucent)
  cap_max: 300000          # MCMC gaussian budget (final file size scales with this)
  sh_degree: 3
  data_factor: 1           # downscale factor for training images (1 = full res)

cleanup:
  # The background/turntable is already gone (masked black), so cleanup only needs
  # to kill stray floaters/fog — NOT crop the object. Keep it gentle so the PLATE
  # under the food survives (its flat rim sits at the spatial extremes).
  opacity_min: 0.05        # drop gaussians more transparent than this
  scale_max_pct: 99.9      # drop gaussians larger than this percentile (kills blobs)
  bbox_pct: [0.1, 99.9]    # very gentle spatial crop (keeps the plate rim)
  knn_k: 16                # neighbors for statistical outlier removal
  knn_std: 3.0             # drop points whose mean kNN distance > mean + std*this

export:
  formats: [splat, ply]    # both produced; .splat is the canonical menu asset
  # Make the food pop (it comes out a bit flat/washed from 3DGS). 1.0 = no change.
  brightness: 1.05
  contrast: 1.18
  saturation: 1.35
